version: '3.4'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      FRONTEND_URL: http://localhost:5173
      # HUGGINGFACEHUB_API_TOKEN, JWT_SECRET_KEY, SMTP_* etc. come from
      # backend/.env via env_file below - keep secrets out of this file.
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - postgres
    volumes:
      - ./backend/documents:/app/documents

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  postgres_data: