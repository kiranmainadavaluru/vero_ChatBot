version: '3.4'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    # Host port 5432 not published to avoid conflict with a local Postgres
    # service. Use `docker compose exec postgres psql -U rag_user rag_chatbot`
    # for host-side access, or re-add a mapping like "5433:5432".
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    environment:
      # QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      FRONTEND_URL: http://localhost:5173
      # GEMINI_API_KEY, JWT_SECRET_KEY, SMTP_* etc. come from
      # backend/.env via env_file below - keep secrets out of this file.
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - postgres
    volumes:
      - ./backend/documents:/app/documents

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  postgres_data: